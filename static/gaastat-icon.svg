<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Bold, heavy sans-serif G in lime green -->
  <path d="M 390,160 
           C 360,100 300,70 240,70 
           140,70 70,145 70,256 
           70,367 140,442 240,442 
           340,442 410,367 410,256 
           L 410,240 
           L 240,240 
           L 240,310 
           L 335,310 
           C 325,350 290,375 240,375 
           185,375 145,330 145,256 
           145,182 185,137 240,137 
           280,137 315,155 335,190 
           Z" fill="#A8E63D"/>
           
  <!-- Circular hole in the center of the G - Made transparent by using a mask -->
  <mask id="holeMask">
    <rect width="512" height="512" fill="white"/>
    <circle cx="240" cy="256" r="65" fill="black"/>
  </mask>
  
  <!-- Re-apply the G with the mask to create a real hole -->
  <path d="M 390,160 
           C 360,100 300,70 240,70 
           140,70 70,145 70,256 
           70,367 140,442 240,442 
           340,442 410,367 410,256 
           L 410,240 
           L 240,240 
           L 240,310 
           L 335,310 
           C 325,350 290,375 240,375 
           185,375 145,330 145,256 
           145,182 185,137 240,137 
           280,137 315,155 335,190 
           Z" fill="#A8E63D" mask="url(#holeMask)"/>
  
  <!-- Three rising bar chart bars in orange inside the hole -->
  <rect x="205" y="275" width="18" height="25" rx="9" ry="9" fill="#FF8C00"/>
  <rect x="231" y="250" width="18" height="50" rx="9" ry="9" fill="#FF8C00"/>
  <rect x="257" y="225" width="18" height="75" rx="9" ry="9" fill="#FF8C00"/>
</svg>
