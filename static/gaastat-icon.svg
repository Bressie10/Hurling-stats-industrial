<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Mask to create a transparent hole in the G -->
  <mask id="holeMaskRefined">
    <rect width="512" height="512" fill="white"/>
    <circle cx="256" cy="256" r="70" fill="black"/>
  </mask>
  
  <!-- Bold, heavy sans-serif G in lime green with curved terminal -->
  <!-- Re-centered to 256, 256 for better balance in the square -->
  <path d="M 420,160 
           C 390,100 330,70 256,70 
           140,70 70,145 70,256 
           70,367 140,442 256,442 
           372,442 442,367 442,256 
           L 442,240 
           L 256,240 
           L 256,315 
           L 362,315 
           C 350,360 310,385 256,385 
           190,385 145,335 145,256 
           145,177 190,127 256,127 
           305,127 345,150 365,190 
           L 420,160 
           Z" fill="#A8E63D" mask="url(#holeMaskRefined)"/>
  
  <!-- Three rising bar chart bars in orange inside the hole -->
  <!-- Centered relative to the new hole position (256, 256) -->
  <rect x="221" y="275" width="18" height="25" rx="9" ry="9" fill="#FF8C00"/>
  <rect x="247" y="250" width="18" height="50" rx="9" ry="9" fill="#FF8C00"/>
  <rect x="273" y="225" width="18" height="75" rx="9" ry="9" fill="#FF8C00"/>
</svg>
