<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Small Icon to the left -->
  <g transform="translate(80, 100) scale(0.4)">
    <!-- Mask to create a transparent hole in the G -->
    <mask id="holeMaskFull">
      <rect x="0" y="0" width="512" height="512" fill="white"/>
      <circle cx="240" cy="256" r="65" fill="black"/>
    </mask>
    
    <!-- Bold, heavy sans-serif G in lime green with mask -->
    <path d="M 390,160 
             C 360,100 300,70 240,70 
             140,70 70,145 70,256 
             70,367 140,442 240,442 
             340,442 410,367 410,256 
             L 410,240 
             L 240,240 
             L 240,310 
             L 335,310 
             C 325,350 290,375 240,375 
             185,375 145,330 145,256 
             145,182 185,137 240,137 
             280,137 315,155 335,190 
             Z" fill="#A8E63D" mask="url(#holeMaskFull)"/>
    
    <!-- Three rising bar chart bars in orange inside the hole -->
    <rect x="205" y="275" width="18" height="25" rx="9" ry="9" fill="#FF8C00"/>
    <rect x="231" y="250" width="18" height="50" rx="9" ry="9" fill="#FF8C00"/>
    <rect x="257" y="225" width="18" height="75" rx="9" ry="9" fill="#FF8C00"/>
  </g>

  <!-- Wordmark -->
  <!-- "GAA" in bold heavy lime green (#A8E63D) -->
  <text x="320" y="240" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="140" fill="#A8E63D">GAA</text>
  <!-- "stat" in white regular weight (for dark backgrounds) -->
  <text x="660" y="240" font-family="Arial, sans-serif" font-weight="400" font-size="140" fill="#FFFFFF">stat</text>
</svg>
